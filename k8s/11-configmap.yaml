apiVersion: v1
kind: ConfigMap
metadata:
  name: flowsharp-config
  namespace: flowsharp
data:
  # Gizli olmayan ortak ayarlar. Baglanti dizesi ve sifreler deployment'larda
  # secret'tan enjekte edilir (bkz. 40-web.yaml / 41-worker.yaml).
  Database__Provider: "Postgres"
  Redis__ConnectionString: "redis:6379"

  # Worker instance basina es zamanli is sayisi (Faz 1).
  Worker__MaxConcurrency: "5"

  # Kullanici basina dakikalik calistirma limiti (Faz 1).
  RateLimit__Enabled: "true"
  RateLimit__RunsPerMinutePerUser: "60"

  # OpenTelemetry (Faz 2). Kumede bir OTLP collector varsa endpoint'i ayarlayin.
  OpenTelemetry__Enabled: "true"
  OpenTelemetry__OtlpEndpoint: "http://otel-collector:4317"

  # Blob offload (Faz 2). Coklu replica'da dosya sistemi saglayicisi PAYLASILAN (RWX)
  # bir volume gerektirir; aksi halde bir pod'un yazdigi blob'u digeri okuyamaz.
  # RWX volume baglamadan true yapmayin (veya S3 saglayicisina gecin).
  BlobStorage__Enabled: "false"
  BlobStorage__ThresholdBytes: "65536"
