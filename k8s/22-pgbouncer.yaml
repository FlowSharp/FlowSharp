# PgBouncer: web/worker'in cok sayidaki baglantisini az sayida gercek Postgres baglantisinda
# havuzlar (connection storm onleme). Yatay olceklemede kritik: 20 worker x havuz = yuzlerce
# baglanti yerine PgBouncer arkasinda sabit kucuk bir havuz. Transaction pooling modu.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pgbouncer
  namespace: flowsharp
spec:
  replicas: 2
  selector:
    matchLabels:
      app: pgbouncer
  template:
    metadata:
      labels:
        app: pgbouncer
    spec:
      containers:
        - name: pgbouncer
          image: edoburu/pgbouncer:latest
          ports:
            - containerPort: 5432
          env:
            - name: DB_HOST
              value: postgres
            - name: DB_PORT
              value: "5432"
            - name: DB_NAME
              value: flowsharp_db
            - name: DB_USER
              value: postgres
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: flowsharp-secrets
                  key: PostgresPassword
            - name: AUTH_TYPE
              value: scram-sha-256
            - name: POOL_MODE
              value: transaction
            - name: MAX_CLIENT_CONN
              value: "1000"
            - name: DEFAULT_POOL_SIZE
              value: "25"
          resources:
            requests:
              cpu: "50m"
              memory: "32Mi"
            limits:
              cpu: "250m"
              memory: "128Mi"
          readinessProbe:
            tcpSocket:
              port: 5432
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: pgbouncer
  namespace: flowsharp
spec:
  selector:
    app: pgbouncer
  ports:
    - port: 5432
      targetPort: 5432
