# Redis: coklu-proses canli event akisi (Web <-> Worker Pub/Sub) icin.
# Uretimde yonetilen bir Redis (veya HA/cluster) tercih edin; bu basit tek-replica dev/test icindir.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: flowsharp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
          readinessProbe:
            tcpSocket:
              port: 6379
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: flowsharp
spec:
  selector:
    app: redis
  ports:
    - port: 6379
      targetPort: 6379
