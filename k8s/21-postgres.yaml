# Postgres: dev/test icin tek-replica StatefulSet. URETIMDE yonetilen bir Postgres
# (RDS / Cloud SQL / Azure DB) onerilir; bu durumda bu dosyayi atlayip pgbouncer'in
# DB_HOST'unu (22-pgbouncer.yaml) yonetilen sunucuya yonlendirin.
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: flowsharp
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: flowsharp_db
            - name: POSTGRES_USER
              value: postgres
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: flowsharp-secrets
                  key: PostgresPassword
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "postgres", "-d", "flowsharp_db"]
            initialDelaySeconds: 10
            periodSeconds: 10
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: flowsharp
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
