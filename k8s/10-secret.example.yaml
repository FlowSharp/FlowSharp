# ORNEK secret. Gercek ortamda bu dosyayi versiyon kontrolune KOYMAYIN; bunun yerine
# `kubectl create secret` ile veya bir gizli yonetimi (SealedSecrets, External Secrets, Vault) kullanin.
#
# Uretmek icin ornek:
#   kubectl -n flowsharp create secret generic flowsharp-secrets \
#     --from-literal=CredentialEncryptionKey="$(openssl rand -base64 32)" \
#     --from-literal=PostgresPassword="degistir-guclu-bir-sifre"
apiVersion: v1
kind: Secret
metadata:
  name: flowsharp-secrets
  namespace: flowsharp
type: Opaque
stringData:
  # Credential sifreleme anahtari (AES, base64 32 byte). MUTLAKA degistirin.
  CredentialEncryptionKey: "TXlTdXBlclNlY3JldEVuY3J5cHRpb25LZXkxMjM0NTY="
  # Postgres parolasi (postgres + pgbouncer ayni degeri kullanir).
  PostgresPassword: "postgres"
